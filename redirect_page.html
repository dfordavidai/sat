<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting…</title>
<style>
  body{font-family:monospace;background:#09090b;color:#6b7280;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-size:13px}
  .msg{text-align:center}
  .spinner{display:inline-block;animation:spin 1s linear infinite;font-size:1.4rem;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="msg">
  <div class="spinner">⟳</div>
  <div>Redirecting…</div>
</div>
<script>
// ── LinkCore 301 Redirect ──
// Supabase config — keep in sync with linkcore_v11.html
const SB_URL = 'https://ydfeubmrlbkddlidhniv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkZmV1Ym1ybGJrZGRsaWRobml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTQ4MzMsImV4cCI6MjA5MzE5MDgzM30.VGz8WVrYbohyFPDb-n8YEzHI27RVd9Vt-OYjGyDEyFU';

// Extract code from path: /link/XXXXX → XXXXX
const code = location.pathname.split('/').filter(Boolean).pop();

if (!code) {
  document.querySelector('.msg').innerHTML = '<div style="color:#ef4444">⚠ No code in URL.</div>';
} else {
  (async () => {
    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/ic_short_links?code=eq.${encodeURIComponent(code)}&select=target,hits&limit=1`,
        { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
      );
      const rows = await res.json();
      if (!Array.isArray(rows) || !rows.length || !rows[0].target) {
        document.querySelector('.msg').innerHTML = '<div style="color:#ef4444">⚠ Short link not found.</div>';
        return;
      }
      const target = rows[0].target;

      // Increment hit counter (fire-and-forget)
      fetch(
        `${SB_URL}/rest/v1/ic_short_links?code=eq.${encodeURIComponent(code)}`,
        {
          method: 'PATCH',
          headers: {
            apikey: SB_KEY,
            Authorization: `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=minimal'
          },
          body: JSON.stringify({ hits: (rows[0].hits || 0) + 1 })
        }
      );

      // 301-style redirect — as close as JS can get
      // (True server-side 301 requires your hosting platform — see notes below)
      location.replace(target);
    } catch (e) {
      document.querySelector('.msg').innerHTML = `<div style="color:#ef4444">⚠ Error: ${e.message}</div>`;
    }
  })();
}
</script>
</body>
</html>
